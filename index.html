<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🚚 Калькулятор грузоперевозок</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* ===== ТЕКСТОВЫЙ ЛОГОТИП ===== */
        .logo-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.15;
            padding-right: 14px;
            border-right: 2px solid #e2e8f0;
        }

        .logo-text .company {
            font-size: 13px;
            font-weight: 700;
            color: #1a202c;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo-text .rf {
            font-size: 10px;
            font-weight: 600;
            color: #4299e1;
            letter-spacing: 2px;
        }

        /* ===== КАРТИНКА ЛОГОТИПА (закомментировано, но можно использовать) ===== */
        /*
        .logo-img {
            height: 50px;
            width: auto;
            max-width: 180px;
            object-fit: contain;
            display: block;
        }
        */

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a202c;
        }

        .version {
            font-size: 12px;
            color: #a0aec0;
            background: #edf2f7;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 14px;
            padding-left: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 6px;
            font-size: 14px;
        }

        select,
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            background: white;
            color: #1a202c;
            -webkit-appearance: none;
            appearance: none;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .unit-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .unit-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            color: #4a5568;
        }

        .unit-btn.active {
            background: #4299e1;
            color: white;
            border-color: #4299e1;
        }

        .unit-btn:hover:not(.active) {
            border-color: #4299e1;
        }

        .calc-btn {
            width: 100%;
            padding: 14px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calc-btn:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
        }

        .calc-btn:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 30px;
        }

        .result-item {
            background: #f7fafc;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-left: 4px solid #4299e1;
            transition: all 0.2s;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item:hover {
            transform: translateX(6px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .result-item.best {
            border-left-color: #48bb78;
            background: #f0fff4;
        }

        .result-item.our-truck {
            border-left-color: #9f7aea;
            background: #faf5ff;
        }

        .result-item.our-truck .result-carrier {
            color: #6b46c1;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .result-carrier {
            font-weight: 700;
            font-size: 18px;
            color: #1a202c;
        }

        .result-price {
            font-weight: 700;
            font-size: 20px;
            color: #2b6cb0;
        }

        .result-price.best-price {
            color: #38a169;
        }

        .result-details {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #718096;
            flex-wrap: wrap;
            margin-top: 8px;
            align-items: center;
        }

        .result-details span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge {
            background: #edf2f7;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: #4a5568;
        }

        .badge.best-badge {
            background: #48bb78;
            color: white;
        }

        .badge.our-badge {
            background: #9f7aea;
            color: white;
        }

        .badge.no-margin-badge {
            background: #f6ad55;
            color: white;
        }

        .badge.min-badge {
            background: #ed8936;
            color: white;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
        }

        .no-results .emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .margin-block {
            background: #f8fafc;
            border-radius: 8px;
            padding: 10px 14px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
        }

        .margin-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0;
            flex-wrap: wrap;
        }

        .margin-label {
            font-size: 13px;
            color: #4a5568;
            font-weight: 500;
            min-width: 130px;
        }

        .margin-value {
            font-weight: 600;
            font-size: 14px;
        }

        .margin-value.cost {
            color: #718096;
        }

        .margin-value.price {
            color: #2b6cb0;
            font-size: 16px;
        }

        .margin-value.price-final {
            color: #6b46c1;
            font-size: 16px;
        }

        .margin-value.profit {
            font-weight: 700;
            font-size: 15px;
        }

        .margin-badge {
            background: #edf2f7;
            padding: 1px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: #2d3748;
        }

        .margin-badge.final-badge {
            background: #9f7aea;
            color: white;
        }

        .margin-emoji {
            font-size: 16px;
            margin-left: 4px;
        }

        .margin-progress {
            width: 100%;
            height: 5px;
            background: #edf2f7;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }

        .margin-progress-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .margin-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 14px 18px;
            background: #f7fafc;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .margin-summary-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .margin-summary-item .label {
            font-size: 11px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .margin-summary-item .value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 2px;
        }

        .history {
            margin-top: 30px;
            border-top: 2px solid #edf2f7;
            padding-top: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-header h3 {
            color: #2d3748;
            font-size: 16px;
        }

        .clear-history {
            background: none;
            border: none;
            color: #fc8181;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .clear-history:hover {
            background: #fff5f5;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            flex-wrap: wrap;
            gap: 6px;
        }

        .history-item:hover {
            background: #edf2f7;
        }

        .history-item .route {
            color: #2d3748;
            font-weight: 500;
        }

        .history-item .info {
            color: #718096;
            font-size: 12px;
        }

        .history-item .hprice {
            color: #2b6cb0;
            font-weight: 600;
        }

        .history-item .hcost {
            color: #a0aec0;
            font-size: 12px;
            text-decoration: line-through;
        }

        .history-empty {
            color: #a0aec0;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }

        .history-item.our-history {
            background: #faf5ff;
            border-left: 3px solid #9f7aea;
        }

        .margin-settings {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f7fafc;
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .margin-settings label {
            margin-bottom: 0;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
            white-space: nowrap;
        }

        .margin-settings input {
            width: 80px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }

        .margin-settings .hint {
            font-size: 13px;
            color: #718096;
        }

        .margin-settings .reset-btn {
            background: none;
            border: none;
            color: #4299e1;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .margin-settings .reset-btn:hover {
            color: #2b6cb0;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .margin-summary {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .margin-summary-item {
                flex-direction: row;
                justify-content: space-between;
                width: 100%;
            }

            .margin-summary-item .label {
                font-size: 12px;
            }

            .margin-summary-item .value {
                font-size: 16px;
            }

            .header-left {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 16px;
                border-radius: 12px;
            }

            .row {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 18px;
            }

            .result-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .margin-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }

            .margin-label {
                min-width: auto;
            }

            .margin-settings {
                flex-direction: column;
                align-items: stretch;
            }

            .margin-settings input {
                width: 100%;
            }

            .logo-text .company {
                font-size: 11px;
            }

            .logo-text .rf {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ШАПКА С ТЕКСТОВЫМ ЛОГОТИПОМ -->
        <div class="header">
            <div class="header-left">
                <div class="logo-text">
                    <span class="company">Грузовая компания</span>
                    <span class="rf">РФ</span>
                </div>
                <h1>🚚 Калькулятор грузоперевозок</h1>
            </div>
            <span class="version">v3.3</span>
        </div>
        <p class="subtitle">Расчёт стоимости перевозки с учётом маржинальности</p>

        <!-- НАСТРОЙКА НАЦЕНКИ -->
        <div class="margin-settings">
            <label>⚙️ Наценка:</label>
            <input type="number" id="marginPercent" value="43" min="0" max="300" step="0.5" />
            <span class="hint">% (коэффициент ×<span id="marginMultiplierDisplay">1.43</span>)</span>
            <button class="reset-btn" id="resetMarginBtn">↺ Сбросить</button>
        </div>

        <!-- ВЫБОР МАРШРУТА -->
        <div class="row">
            <div class="form-group">
                <label>📍 Откуда</label>
                <select id="fromCity">
                    <option value="">Выберите город</option>
                </select>
            </div>
            <div class="form-group">
                <label>📍 Куда</label>
                <select id="toCity" disabled>
                    <option value="">Сначала выберите "Откуда"</option>
                </select>
            </div>
        </div>

        <!-- ЕДИНИЦЫ ИЗМЕРЕНИЯ -->
        <div class="form-group">
            <label>Единица измерения</label>
            <div class="unit-toggle">
                <button class="unit-btn active" data-unit="kg">📦 За кг</button>
                <button class="unit-btn" data-unit="m3">📐 За м³</button>
            </div>
        </div>

        <!-- ЗНАЧЕНИЕ -->
        <div class="form-group">
            <label id="valueLabel">Вес (кг)</label>
            <input type="number" id="valueInput" placeholder="Например: 150" min="0.1" step="0.1" />
        </div>

        <!-- КНОПКА РАСЧЁТА -->
        <button class="calc-btn" id="calcBtn">🧮 Рассчитать стоимость</button>

        <!-- РЕЗУЛЬТАТЫ -->
        <div id="resultsContainer" class="results"></div>

        <!-- ИСТОРИЯ -->
        <div class="history" id="historyContainer">
            <div class="history-header">
                <h3>📋 История расчётов</h3>
                <button class="clear-history" id="clearHistory">Очистить</button>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

                kg: { min: 4080, upTo500: 43 }, m3: { min: 4080, upTo1: 10000 }, minSum: 4080,
                delivery: "6-7", type: "ЖД ПБ" },
            { from: "Москва", to: "Улан-Удэ", carrier: "Бюро перевозок",
                kg: { min: 650, upTo500: 33, upTo5000: 33, upTo20000: 32.5 },
                m3: { min: 650, upTo1: 7370, upTo7: 7260, upTo40: 7150 }, minSum: 650,
                delivery: "8-9", type: "Авто" },

            // =========================================================
            // МОСКВА → ЧИТА
            // =========================================================
            { from: "Москва", to: "Чита", carrier: "Трансот",
                kg: { min: 4080, upTo500: 45 }, m3: { min: 4080, upTo1: 10600 }, minSum: 4080,
                delivery: "7-8", type: "ЖД ПБ" },
            { from: "Москва", to: "Чита", carrier: "Бюро перевозок",
                kg: { min: 650, upTo500: 34, upTo5000: 33.5, upTo20000: 33 },
                m3: { min: 650, upTo1: 7480, upTo7: 7370, upTo40: 7260 }, minSum: 650,
                delivery: "9-10", type: "Авто" },

            // =========================================================
            // МОСКВА → ПЕТРОПАВЛОВСК-КАМЧАТСКИЙ
            // =========================================================
            { from: "Москва", to: "Петропавловск-Камчатский", carrier: "ТрейдТрансГрупп",
                kg: { min: 6200, upTo500: 38.5, upTo5000: 36.5, upTo20000: 36 },
                m3: { min: 6200, upTo1: 11700, upTo7: 11500, upTo40: 11200 }, minSum: 6200,
                delivery: "38-43", type: "ЖД" },
            { from: "Москва", to: "Петропавловск-Камчатский", carrier: "Бюро перевозок",
                kg: { min: 1100, upTo500: 43.5, upTo5000: 42.5, upTo20000: 41.5 },
                m3: { min: 1100, upTo1: 9570, upTo7: 9350, upTo40: 9130 }, minSum: 1100,
                delivery: "11-12", type: "авто" },

            // =========================================================
            // МОСКВА → ЮЖНО-САХАЛИНСК
            // =========================================================
            { from: "Москва", to: "Южно-Сахалинск", carrier: "ТрейдТрансГрупп",
                kg: { min: 5200, upTo500: 36.5, upTo5000: 34.5, upTo20000: 34 },
                m3: { min: 5200, upTo1: 8800, upTo7: 8600, upTo40: 8300 }, minSum: 5200,
                delivery: "34-39", type: "ЖД" },
            { from: "Москва", to: "Южно-Сахалинск", carrier: "Бюро перевозок",
                kg: { min: 1100, upTo500: 43.5, upTo5000: 42.5, upTo20000: 41.5 },
                m3: { min: 1100, upTo1: 9570, upTo7: 9350, upTo40: 9130 }, minSum: 1100,
                delivery: "11-12", type: "авто" },
        ];

        // ============================================================
        // 2. ЛОГИКА РАСЧЁТА (с учётом minSum)
        // ============================================================
        function calculatePrice(from, to, value, unit) {
            const routes = tariffsDB.filter(t => t.from === from && t.to === to);

            if (routes.length === 0) {
                return { error: "Маршрут не найден" };
            }

            const results = routes.map(route => {
                let unitPrice;

                if (unit === 'kg') {
                    const kg = route.kg;
                    if (value <= 500) unitPrice = kg.upTo500 || kg.min;
                    else if (value <= 5000) unitPrice = kg.upTo5000 || kg.upTo500 || kg.min;
                    else if (value <= 20000) unitPrice = kg.upTo20000 || kg.upTo5000 || kg.min;
                    else unitPrice = kg.min || kg.upTo20000 || kg.upTo5000 || kg.upTo500;
                } else {
                    const m3 = route.m3;
                    if (value <= 1) unitPrice = m3.upTo1 || m3.min;
                    else if (value <= 7) unitPrice = m3.upTo7 || m3.upTo1 || m3.min;
                    else if (value <= 40) unitPrice = m3.upTo40 || m3.upTo7 || m3.min;
                    else unitPrice = m3.min || m3.upTo40 || m3.upTo7 || m3.upTo1;
                }

                if (unitPrice === undefined || unitPrice === null || unitPrice === 0) {
                    return null;
                }

                const minSum = route.minSum || 0;
                const calculatedPrice = Math.round(unitPrice * value);
                let finalPrice = calculatedPrice;
                let usedMinSum = false;

                if (minSum > 0 && calculatedPrice < minSum) {
                    finalPrice = minSum;
                    usedMinSum = true;
                }

                return {
                    carrier: route.carrier,
                    price: finalPrice,
                    calculatedPrice: calculatedPrice,
                    unitPrice: unitPrice,
                    minSum: minSum,
                    usedMinSum: usedMinSum,
                    delivery: route.delivery || "—",
                    type: route.type || "—",
                    isOurTruck: route.isOurTruck || false,
                    isFinalPrice: route.isFinalPrice || false
                };
            }).filter(r => r !== null);

            if (results.length === 0) {
                return { error: "Нет данных для этого объёма" };
            }

            results.sort((a, b) => {
                if (a.isOurTruck && !b.isOurTruck) return -1;
                if (!a.isOurTruck && b.isOurTruck) return 1;
                return a.price - b.price;
            });

            return results;
        }

        // ============================================================
        // 3. РАСЧЁТ С МАРЖОЙ
        // ============================================================
        function calculateWithMargin(from, to, value, unit, marginPercent) {
            const results = calculatePrice(from, to, value, unit);

            if (results.error) return results;

            return results.map(r => {
                if (r.isOurTruck && r.isFinalPrice) {
                    return {
                        ...r,
                        costPrice: r.price,
                        priceWithMargin: r.price,
                        marginRub: 0,
                        marginPercent: 0,
                        marginMultiplier: 1,
                        isOurTruck: true,
                        isFinalPrice: true
                    };
                }

                const multiplier = 1 + (marginPercent / 100);
                const priceWithMargin = Math.round(r.price * multiplier);
                const marginRub = priceWithMargin - r.price;
                const marginPercentActual = Math.round((marginRub / r.price) * 100);

                return {
                    ...r,
                    costPrice: r.price,
                    priceWithMargin: priceWithMargin,
                    marginRub: marginRub,
                    marginPercent: marginPercentActual,
                    marginMultiplier: multiplier,
                    isOurTruck: false,
                    isFinalPrice: false
                };
            });
        }

        // ============================================================
        // 4. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function getMarginColor(percent) {
            if (percent >= 50) return '#48bb78';
            if (percent >= 30) return '#ecc94b';
            if (percent >= 15) return '#ed8936';
            return '#fc8181';
        }

        function formatMargin(percent, rub) {
            const color = getMarginColor(percent);
            const emoji = percent >= 50 ? '🟢' : percent >= 30 ? '🟡' : percent >= 15 ? '🟠' : '🔴';
            return {
                text: `${rub.toLocaleString()} ₽ (${percent}%)`,
                color: color,
                emoji: emoji
            };
        }

        // ============================================================
        // 5. ИНТЕРФЕЙС
        // ============================================================
        const fromSelect = document.getElementById('fromCity');
        const toSelect = document.getElementById('toCity');
        const valueInput = document.getElementById('valueInput');
        const valueLabel = document.getElementById('valueLabel');
        const calcBtn = document.getElementById('calcBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistory');
        const marginPercentInput = document.getElementById('marginPercent');
        const marginMultiplierDisplay = document.getElementById('marginMultiplierDisplay');
        const resetMarginBtn = document.getElementById('resetMarginBtn');

        // Уникальные города
        const cities = [...new Set(tariffsDB.map(t => t.from))].sort();

        cities.forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            fromSelect.appendChild(option);
        });

        fromSelect.addEventListener('change', function() {
            const from = this.value;
            toSelect.innerHTML = '<option value="">Выберите город</option>';
            toSelect.disabled = true;

            if (!from) return;

            const destinations = [...new Set(
                tariffsDB.filter(t => t.from === from).map(t => t.to)
            )].sort();

            destinations.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                toSelect.appendChild(option);
            });

            toSelect.disabled = false;
        });

        // Единицы измерения
        document.querySelectorAll('.unit-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const unit = this.dataset.unit;
                valueLabel.textContent = unit === 'kg' ? 'Вес (кг)' : 'Объём (м³)';
                valueInput.placeholder = unit === 'kg' ? 'Например: 150' : 'Например: 2.5';
            });
        });

        // Настройка наценки
        marginPercentInput.addEventListener('input', function() {
            const val = parseFloat(this.value) || 0;
            const multiplier = 1 + (val / 100);
            marginMultiplierDisplay.textContent = multiplier.toFixed(2);
        });

        resetMarginBtn.addEventListener('click', function() {
            marginPercentInput.value = '43';
            marginMultiplierDisplay.textContent = '1.43';
        });

        // ============================================================
        // 6. ИСТОРИЯ
        // ============================================================
        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem('calcHistory')) || [];
            } catch {
                return [];
            }
        }

        function saveHistory(entry) {
            const history = getHistory();
            history.unshift({
                ...entry,
                timestamp: new Date().toLocaleString('ru-RU')
            });
            if (history.length > 50) history.pop();
            localStorage.setItem('calcHistory', JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() {
            localStorage.removeItem('calcHistory');
            renderHistory();
        }

        function renderHistory() {
            const history = getHistory();
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-empty">История расчётов пуста</div>';
                return;
            }

            historyList.innerHTML = history.map((item, index) => {
                const isOurTruck = item.carrier && item.carrier.includes('Наша машина');
                return `
                    <div class="history-item ${isOurTruck ? 'our-history' : ''}" data-index="${index}">
                        <span class="route">${item.from} → ${item.to}</span>
                        <span class="info">
                            ${item.value} ${item.unit} · ${item.carrier}
                            ${item.marginPercent !== undefined && item.marginPercent > 0 ? ` · +${item.marginPercent}%` : ''}
                            ${item.isFinalPrice ? ' · 🏠 Финальная цена' : ''}
                            ${item.usedMinSum ? ' · ⚠️ Минималка' : ''}
                        </span>
                        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                            ${item.costPrice !== item.priceWithMargin ? `<span class="hcost">${(item.costPrice || item.price).toLocaleString()} ₽</span>` : ''}
                            <span class="hprice">${(item.priceWithMargin || item.price).toLocaleString()} ₽</span>
                        </div>
                    </div>
                `;
            }).join('');

            historyList.querySelectorAll('.history-item').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    const item = getHistory()[idx];
                    if (item) {
                        fromSelect.value = item.from;
                        fromSelect.dispatchEvent(new Event('change'));
                        setTimeout(() => {
                            toSelect.value = item.to;
                        }, 100);
                        const unitBtn = document.querySelector(`.unit-btn[data-unit="${item.unit}"]`);
                        if (unitBtn) unitBtn.click();
                        valueInput.value = item.value;
                        setTimeout(() => calcBtn.click(), 200);
                    }
                });
            });
        }

        clearHistoryBtn.addEventListener('click', clearHistory);

        // ============================================================
        // 7. ОСНОВНОЙ РАСЧЁТ
        // ============================================================
        calcBtn.addEventListener('click', function() {
            const from = fromSelect.value;
            const to = toSelect.value;
            const unit = document.querySelector('.unit-btn.active').dataset.unit;
            const value = parseFloat(valueInput.value);
            const marginPercent = parseFloat(marginPercentInput.value) || 0;

            if (!from || !to) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="emoji">⚠️</div>
                        <p>Выберите маршрут</p>
                    </div>
                `;
                return;
            }

            if (!value || value <= 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="emoji">⚠️</div>
                        <p>Введите корректное значение</p>
                    </div>
                `;
                return;
            }

            const results = calculateWithMargin(from, to, value, unit, marginPercent);

            if (results.error) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="emoji">😕</div>
                        <p>${results.error}</p>
                    </div>
                `;
                return;
            }

            const unitLabel = unit === 'kg' ? 'кг' : 'м³';
            const best = results[0];

            const marginResults = results.filter(r => r.marginPercent > 0);
            const avgMargin = marginResults.length > 0 ?
                Math.round(marginResults.reduce((sum, r) => sum + r.marginPercent, 0) / marginResults.length) :
                0;

            let html = `
                <h3 style="margin-bottom:16px;color:#2d3748;">
                    ✅ Найдено ${results.length} вариантов
                    <span style="font-size:14px;font-weight:400;color:#718096;margin-left:12px;">
                        Наценка: +${marginPercent}% (×${(1 + marginPercent/100).toFixed(2)})
                    </span>
                </h3>

                <div class="margin-summary">
                    <div class="margin-summary-item">
                        <span class="label">🏆 Лучший</span>
                        <span class="value" style="color:#38a169;">
                            ${best.priceWithMargin.toLocaleString()} ₽
                        </span>
                    </div>
                    <div class="margin-summary-item">
                        <span class="label">📈 Средняя маржа</span>
                        <span class="value" style="color: ${getMarginColor(avgMargin)};">
                            ${avgMargin}%
                        </span>
                    </div>
                    <div class="margin-summary-item">
                        <span class="label">💰 Маржа лучшего</span>
                        <span class="value" style="color:#48bb78;">
                            ${best.marginRub.toLocaleString()} ₽
                        </span>
                    </div>
                </div>
            `;

            results.forEach((r, index) => {
                const isBest = index === 0;
                const isOurTruck = r.isOurTruck;
                const isFinalPrice = r.isFinalPrice;
                const usedMinSum = r.usedMinSum;
                const marginInfo = formatMargin(r.marginPercent, r.marginRub);
                const marginColor = getMarginColor(r.marginPercent);

                let resultClass = 'result-item';
                if (isBest && !isOurTruck) resultClass += ' best';
                if (isOurTruck) resultClass += ' our-truck';

                let badgeHtml = '';
                if (isBest && !isOurTruck) badgeHtml += ' <span class="badge best-badge">⭐ Лучший</span>';
                if (isOurTruck) badgeHtml += ' <span class="badge our-badge">🏠 Свой транспорт</span>';
                if (isFinalPrice) badgeHtml += ' <span class="badge no-margin-badge">💰 Финальная цена</span>';
                if (usedMinSum) badgeHtml += ' <span class="badge min-badge">⚠️ Мин. сумма</span>';

                let priceDisplay = r.priceWithMargin.toLocaleString();

                html += `
                    <div class="${resultClass}">
                        <div class="result-header">
                            <span class="result-carrier">
                                ${r.carrier}
                                ${badgeHtml}
                            </span>
                            <span class="result-price ${isBest && !isOurTruck ? 'best-price' : ''}">
                                ${priceDisplay} ₽
                            </span>
                        </div>

                        <div class="margin-block">
                            <div class="margin-row">
                                <span class="margin-label">📦 Себестоимость:</span>
                                <span class="margin-value cost">${r.costPrice.toLocaleString()} ₽</span>
                            </div>
                            <div class="margin-row">
                                <span class="margin-label">💰 ${isFinalPrice ? 'Цена (финальная)' : 'Цена с наценкой'}:</span>
                                <span class="margin-value ${isFinalPrice ? 'price-final' : 'price'}">
                                    ${r.priceWithMargin.toLocaleString()} ₽
                                </span>
                                ${!isFinalPrice ? `<span class="margin-badge">+${r.marginPercent}%</span>` :
                                `<span class="margin-badge final-badge">🏠 Без наценки</span>`}
                                ${usedMinSum ? `<span class="margin-badge" style="background:#ed8936;color:white;">Мин. сумма ${r.minSum.toLocaleString()} ₽</span>` : ''}
                            </div>
                            <div class="margin-row">
                                <span class="margin-label">📈 Маржа:</span>
                                <span class="margin-value profit" style="color: ${marginColor}">
                                    ${marginInfo.text}
                                </span>
                                <span class="margin-emoji">${marginInfo.emoji}</span>
                            </div>
                            <div class="margin-progress">
                                <div class="margin-progress-bar" 
                                     style="width: ${Math.min(r.marginPercent, 100)}%; 
                                            background: ${marginColor};">
                                </div>
                            </div>
                        </div>

                        <div class="result-details">
                            <span>📊 Тариф: ${r.unitPrice} ₽/${unitLabel}</span>
                            ${r.minSum > 0 ? `<span>💰 Мин. сумма: ${r.minSum.toLocaleString()} ₽</span>` : ''}
                            ${r.usedMinSum ? `<span style="color:#ed8936;">⚠️ Применена минимальная сумма</span>` : ''}
                            <span>📅 Срок: ${r.delivery} дн.</span>
                            <span>🚛 ${r.type}</span>
                            ${isOurTruck ? '<span>🏷️ Собственный транспорт</span>' : ''}
                        </div>
                    </div>
                `;
            });

            resultsContainer.innerHTML = html;

            saveHistory({
                from,
                to,
                unit,
                value,
                carrier: best.carrier,
                costPrice: best.costPrice,
                priceWithMargin: best.priceWithMargin,
                marginPercent: best.marginPercent,
                marginRub: best.marginRub,
                price: best.price,
                isFinalPrice: best.isFinalPrice,
                usedMinSum: best.usedMinSum
            });
        });

        valueInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calcBtn.click();
        });

        renderHistory();

        console.log('🚚 Калькулятор грузоперевозок v3.3 загружен!');
        console.log(`📊 Загружено ${tariffsDB.length} тарифов`);
        console.log('🏙️ Доступные города:', cities.join(', '));
        console.log('🏠 Добавлена "Наша машина"');
        console.log('💰 Цена "Нашей машины" уже финальная (без наценки)');
        console.log('⚙️ Наценка настраивается в интерфейсе');
        console.log('💰 Добавлена логика минимальной суммы (minSum)');
    </script>

</body>
