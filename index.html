<!DOCTYPE html>
<html lang="ru">
<head>

        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: #f0f4f8;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
        }

        .version {
            font-size: 12px;
            color: #a0aec0;
            background: #edf2f7;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 6px;
            font-size: 14px;
        }

        select,
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            background: white;
            color: #1a202c;
            -webkit-appearance: none;
            appearance: none;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .unit-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .unit-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            color: #4a5568;
        }

        .unit-btn.active {
            background: #4299e1;
            color: white;
            border-color: #4299e1;
        }

        .unit-btn:hover:not(.active) {
            border-color: #4299e1;
        }

        .calc-btn {
            width: 100%;
            padding: 14px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calc-btn:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
        }

        .calc-btn:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 30px;
        }

        .result-item {
            background: #f7fafc;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-left: 4px solid #4299e1;
            transition: all 0.2s;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item:hover {
            transform: translateX(6px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .result-item.best {
            border-left-color: #48bb78;
            background: #f0fff4;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .result-carrier {
            font-weight: 700;
            font-size: 18px;
            color: #1a202c;
        }

        .result-price {
            font-weight: 700;
            font-size: 20px;
            color: #2b6cb0;
        }

        .result-price.best-price {
            color: #38a169;
        }

        .result-details {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #718096;
            flex-wrap: wrap;
        }

        .result-details span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge {
            background: #edf2f7;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;

            background: #48bb78;
            color: white;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
        }

        .no-results .emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

            margin-top: 30px;
            border-top: 2px solid #edf2f7;
            padding-top: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-header h3 {
            color: #2d3748;
            font-size: 16px;
        }

        .clear-history {
            background: none;
            border: none;
            color: #fc8181;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .clear-history:hover {
            background: #fff5f5;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;

        .history-item:hover {
            background: #edf2f7;
        }

            color: #2d3748;
            font-weight: 500;
        }

        .history-item .info {
            color: #718096;
            font-size: 13px;
        }

            color: #2b6cb0;
            font-weight: 600;
        }

        .history-empty {

            text-align: center;
            padding: 20px;
            font-size: 14px;

            .container {
                padding: 16px;
                border-radius: 12px;

                align-items: flex-start;

            .header {

                align-items: flex-start;

            }

</head>

        // ============================================================
        // 2. ЛОГИКА РАСЧЁТА
        // ============================================================
        function calculatePrice(from, to, value, unit) {
            const routes = tariffsDB.filter(t => t.from === from && t.to === to);

            if (routes.length === 0) {
                return { error: "Маршрут не найден" };
            }

            const results = routes.map(route => {
                let unitPrice;

                if (unit === 'kg') {
                    const kg = route.kg;
                    if (value <= 500) unitPrice = kg.upTo500 || kg.min;
                    else if (value <= 5000) unitPrice = kg.upTo5000 || kg.upTo500 || kg.min;
                    else if (value <= 20000) unitPrice = kg.upTo20000 || kg.upTo5000 || kg.min;
                    else unitPrice = kg.min || kg.upTo20000 || kg.upTo5000 || kg.upTo500;
                } else {
                    const m3 = route.m3;
                    if (value <= 1) unitPrice = m3.upTo1 || m3.min;
                    else if (value <= 7) unitPrice = m3.upTo7 || m3.upTo1 || m3.min;
                    else if (value <= 40) unitPrice = m3.upTo40 || m3.upTo7 || m3.min;
                    else unitPrice = m3.min || m3.upTo40 || m3.upTo7 || m3.upTo1;
                }

                if (unitPrice === undefined || unitPrice === null || unitPrice === 0) {
                    return null;
                }

                return {
                    carrier: route.carrier,
                    price: Math.round(unitPrice * value),
                    unitPrice: unitPrice,
                    delivery: route.delivery || "—",
                    type: route.type || "—"
                };
            }).filter(r => r !== null);

            if (results.length === 0) {
                return { error: "Нет данных для этого объёма" };
            }

            results.sort((a, b) => a.price - b.price);
            return results;
        }

        // ============================================================
        // 3. ИНТЕРФЕЙС
        // ============================================================
        const fromSelect = document.getElementById('fromCity');
        const toSelect = document.getElementById('toCity');
        const valueInput = document.getElementById('valueInput');
        const valueLabel = document.getElementById('valueLabel');
        const calcBtn = document.getElementById('calcBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistory');

        // Уникальные города
        const cities = [...new Set(tariffsDB.map(t => t.from))].sort();

        cities.forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            fromSelect.appendChild(option);
        });

        fromSelect.addEventListener('change', function() {
            const from = this.value;
            toSelect.innerHTML = '<option value="">Выберите город</option>';
            toSelect.disabled = true;

            if (!from) return;

            const destinations = [...new Set(
                tariffsDB.filter(t => t.from === from).map(t => t.to)
            )].sort();

            destinations.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                toSelect.appendChild(option);
            });

            toSelect.disabled = false;
        });

        document.querySelectorAll('.unit-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const unit = this.dataset.unit;
                valueLabel.textContent = unit === 'kg' ? 'Вес (кг)' : 'Объём (м³)';
                valueInput.placeholder = unit === 'kg' ? 'Например: 150' : 'Например: 2.5';
            });
        });

        // ============================================================
        // 4. ИСТОРИЯ (localStorage)
        // ============================================================
        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem('calcHistory')) || [];
            } catch {
                return [];
            }
        }

        function saveHistory(entry) {
            const history = getHistory();
            history.unshift({
                ...entry,
                timestamp: new Date().toLocaleString('ru-RU')
            });
            if (history.length > 50) history.pop();
            localStorage.setItem('calcHistory', JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() {
            localStorage.removeItem('calcHistory');
            renderHistory();
        }

        function renderHistory() {
            const history = getHistory();
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-empty">История расчётов пуста</div>';
                return;
            }

            historyList.innerHTML = history.map((item, index) => `
                <div class="history-item" data-index="${index}">
                    <span class="route">${item.from} → ${item.to}</span>
                    <span class="info">${item.value} ${item.unit} · ${item.carrier}</span>
                    <span class="hprice">${item.price.toLocaleString()} ₽</span>
                </div>
            `).join('');

            // Клик по истории — подставить значения
            historyList.querySelectorAll('.history-item').forEach(el => {
                el.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.index);
                    const item = getHistory()[idx];
                    if (item) {
                        fromSelect.value = item.from;
                        fromSelect.dispatchEvent(new Event('change'));
                        setTimeout(() => {
                            toSelect.value = item.to;
                        }, 100);
                        const unitBtn = document.querySelector(`.unit-btn[data-unit="${item.unit}"]`);
                        if (unitBtn) unitBtn.click();
                        valueInput.value = item.value;
                        setTimeout(() => calcBtn.click(), 200);
                    }
                });
            });
        }

        clearHistoryBtn.addEventListener('click', clearHistory);

        // ============================================================
        // 5. ОСНОВНОЙ РАСЧЁТ
        // ============================================================
        calcBtn.addEventListener('click', function() {
            const from = fromSelect.value;
            const to = toSelect.value;
            const unit = document.querySelector('.unit-btn.active').dataset.unit;
            const value = parseFloat(valueInput.value);

            if (!from || !to) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="emoji">⚠️</div>
                        <p>Выберите маршрут</p>
                    </div>
                `;
                return;
            }

            if (!value || value <= 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="emoji">⚠️</div>
                        <p>Введите корректное значение</p>
                    </div>
                `;
                return;
            }

            const results = calculatePrice(from, to, value, unit);

            if (results.error) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <div class="emoji">😕</div>
                        <p>${results.error}</p>
                    </div>
                `;
                return;
            }

            let html = `<h3 style="margin-bottom:16px;color:#2d3748;">✅ Найдено ${results.length} вариантов</h3>`;

            const best = results[0];
            const unitLabel = unit === 'kg' ? 'кг' : 'м³';

            results.forEach((r, index) => {
                const isBest = index === 0;
                html += `
                    <div class="result-item ${isBest ? 'best' : ''}">
                        <div class="result-header">
                            <span class="result-carrier">
                                ${r.carrier}
                                ${isBest ? ' <span class="badge best-badge">⭐ Лучший</span>' : ''}
                            </span>
                            <span class="result-price ${isBest ? 'best-price' : ''}">
                                ${r.price.toLocaleString()} ₽
                            </span>
                        </div>
                        <div class="result-details">
                            <span>📦 ${r.unitPrice} ₽/${unitLabel}</span>
                            <span>📅 ${r.delivery} дн.</span>
                            <span>🚛 ${r.type}</span>
                        </div>
                    </div>
                `;
            });

            resultsContainer.innerHTML = html;

            // Сохраняем в историю
            saveHistory({
                from,
                to,
                unit,
                value,
                carrier: best.carrier,
                price: best.price
            });
        });

        valueInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calcBtn.click();
        });

        // Инициализация истории
        renderHistory();

        console.log('🚚 Калькулятор грузоперевозок v2.0 загружен!');
        console.log(`📊 Загружено ${tariffsDB.length} тарифов`);
        console.log('🏙️ Доступные города:', cities.join(', '));
        console.log('💾 История сохраняется в localStorage');
    </script>
