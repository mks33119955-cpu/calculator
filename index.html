<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f8;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.15;
            padding-right: 16px;
            border-right: 2px solid #e2e8f0;
        }

        .logo .company {
            font-size: 14px;
            font-weight: 800;
            color: #1a202c;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .logo .rf {
            font-size: 11px;
            font-weight: 700;
            color: #4299e1;
            letter-spacing: 3px;
        }

        .logo .full {
            font-size: 9px;
            font-weight: 600;
            color: #4a5568;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a202c;
        }

        .version {
            font-size: 12px;
            color: #a0aec0;
            background: #edf2f7;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 14px;
            padding-left: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 6px;
            font-size: 14px;
        }

        select,
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            background: white;
            color: #1a202c;
            -webkit-appearance: none;
            appearance: none;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .unit-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .unit-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            color: #4a5568;
        }

        .unit-btn.active {
            background: #4299e1;
            color: white;
            border-color: #4299e1;
        }

        .unit-btn:hover:not(.active) {
            border-color: #4299e1;
        }

        .calc-btn {
            width: 100%;
            padding: 14px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calc-btn:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
        }

        .calc-btn:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 30px;
        }

        .result-item {
            background: #f7fafc;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-left: 4px solid #4299e1;
            transition: all 0.2s;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item:hover {
            transform: translateX(6px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .result-item.best {
            border-left-color: #48bb78;
            background: #f0fff4;
        }

        .result-item.our-truck {
            border-left-color: #9f7aea;
            background: #faf5ff;
        }

        .result-item.our-truck .result-carrier {
            color: #6b46c1;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .result-carrier {
            font-weight: 700;
            font-size: 18px;
            color: #1a202c;
        }

        .result-price {
            font-weight: 700;
            font-size: 20px;
            color: #2b6cb0;
        }

        .result-price.best-price {
            color: #38a169;
        }

        .result-details {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #718096;
            flex-wrap: wrap;
            margin-top: 8px;
            align-items: center;
        }

        .result-details span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .badge {
            background: #edf2f7;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: #4a5568;
        }

        .badge.best-badge {
            background: #48bb78;
            color: white;
        }

        .badge.our-badge {
            background: #9f7aea;
            color: white;
        }

        .badge.no-margin-badge {
            background: #f6ad55;
            color: white;
        }

        .badge.min-badge {
            background: #ed8936;
            color: white;
        }

            padding: 40px 20px;
            color: #718096;
        }

        .no-results .emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .margin-block {
            background: #f8fafc;
            border-radius: 8px;
            padding: 10px 14px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
        }

        .margin-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 2px 0;
            flex-wrap: wrap;
        }

        .margin-label {
            font-size: 13px;
            color: #4a5568;
            font-weight: 500;
            min-width: 130px;
        }

        .margin-value {
            font-weight: 600;
            font-size: 14px;
        }

        .margin-value.cost {

        }

        .margin-value.price {

            font-size: 16px;
        }

        .margin-value.price-final {

            font-size: 16px;
        }

        .margin-value.profit {
            font-weight: 700;
            font-size: 15px;
        }

            padding: 1px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: #2d3748;
        }

        .margin-badge.final-badge {
            background: #9f7aea;
            color: white;
        }

        .margin-emoji {
            font-size: 16px;
            margin-left: 4px;
        }

            width: 100%;
            height: 5px;
            background: #edf2f7;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }

        .margin-progress-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .margin-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 14px 18px;
            background: #f7fafc;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .margin-summary-item {

            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .margin-summary-item .label {
            font-size: 11px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .margin-summary-item .value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 2px;
        }

        .history {
            margin-top: 30px;
            border-top: 2px solid #edf2f7;
            padding-top: 20px;
        }

        .history-header {

            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-header h3 {

            font-size: 16px;
        }

            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 6px;

        }

        .clear-history:hover {

        }

            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
            cursor: pointer;

            flex-wrap: wrap;
            gap: 6px;

        .history-item:hover {
            background: #edf2f7;
        }

        .history-item .route {
            color: #2d3748;
            font-weight: 500;
        }

        .history-item .info {
            color: #718096;
            font-size: 12px;

            color: #2b6cb0;
            font-weight: 600;
        }

        .history-item .hcost {
            color: #a0aec0;
            font-size: 12px;

        }

            text-align: center;
            padding: 20px;
            font-size: 14px;

        .history-item.our-history {

            align-items: center;
            gap: 12px;
            background: #f7fafc;
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .margin-settings label {
            margin-bottom: 0;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
            white-space: nowrap;
        }

            padding: 8px 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }

        .margin-settings .hint {
            font-size: 13px;
            color: #718096;
        }

        .margin-settings .reset-btn {
            background: none;
            border: none;
            color: #4299e1;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .margin-settings .reset-btn:hover {
            color: #2b6cb0;
            text-decoration: underline;
        }

                gap: 8px;

                justify-content: space-between;
                width: 100%;
            }

            .margin-summary-item .label {
                font-size: 12px;
            }

            .margin-summary-item .value {
                font-size: 16px;
            }

            .header-left {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 16px;
                border-radius: 12px;
            }

            .row {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 18px;
            }

            .result-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .margin-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
            }

            .margin-label {
                min-width: auto;
            }

            .margin-settings {
                flex-direction: column;
                align-items: stretch;
            }

            .margin-settings input {
                width: 100%;
            }

            .logo {
                padding-right: 10px;
                border-right: 1px solid #e2e8f0;
            }

            .logo .company {
                font-size: 11px;
            }

            .logo .rf {
                font-size: 9px;
                letter-spacing: 2px;
            }

            .logo .full {
                font-size: 7px;
            }
        }

</head>

    <div class="container">
        <!-- ШАПКА С ЛОГОТИПОМ -->
        <div class="header">

            <label>⚙️ Наценка:</label>
            <input type="number" id="marginPercent" value="43" min="0" max="300" step="0.5" />

            <button class="reset-btn" id="resetMarginBtn">↺ Сбросить</button>
        </div>

        <!-- ВЫБОР МАРШРУТА -->
        <div class="row">
            <div class="form-group">

                <select id="fromCity">

            <div class="unit-toggle">

            </div>
        </div>

        <!-- ЗНАЧЕНИЕ -->

            <label id="valueLabel">Вес (кг)</label>

        </div>

            </div>
            <div id="historyList"></div>
